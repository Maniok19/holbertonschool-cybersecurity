SSH_PORT=22
ALLOWED_SSH_USERS="admin sysadmin"
ALLOW_HTTP=80
ALLOW_HTTPS=443
DEFAULT_INPUT=deny
DEFAULT_OUTPUT=allow
FW_POLICY_FILE="/etc/hardening/firewall.rules"
SYSCTL_FILE="/etc/sysctl.conf"
LOG_FILE="/var/log/hardening.log"
SSHD_CONFIG="/etc/ssh/sshd_config"
LOGIN_DEFS_FILE="/etc/login.defs"
PAM_PASSWORD_FILE="/etc/pam.d/common-password"
PAM_AUTH_FILE="/etc/pam.d/common-auth"
PASSWD_FILE="/etc/passwd"
GROUP_FILE="/etc/group"
AUDIT_FILE="./audit_report.txt"
PASS_MIN_LEN=12
PASS_MAX_DAYS=90
FAIL_LOCK_ATTEMPTS=5
INSTALLED_PACKAGES="auditd fail2ban"
REMOVED_PACKAGES="telnet ftp netcat-traditional"
